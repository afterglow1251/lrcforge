name: ci

on:
  push:
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Create venv + install (no heavy ML — the fakes path exercises everything)
        run: |
          uv venv
          uv pip install -e ".[dev,service]"

      - name: ruff
        run: uv run ruff check .

      - name: mypy --strict
        run: uv run mypy

      - name: import-linter
        run: uv run lint-imports

      - name: pytest
        run: uv run pytest -q
